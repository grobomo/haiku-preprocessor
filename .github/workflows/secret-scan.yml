name: Secret Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          echo "Scanning for secrets..."
          FOUND=0

          # JWT tokens
          if grep -rn "eyJ[A-Za-z0-9_-]*\.\(eyJ[A-Za-z0-9_-]*\)\.[A-Za-z0-9_-]*" --include="*.js" --include="*.json" --include="*.yaml" --include="*.yml" --include="*.md" . | grep -v "node_modules" | grep -v ".git/"; then
            echo "ERROR: JWT token found"
            FOUND=1
          fi

          # Anthropic API keys
          if grep -rn "sk-ant-" . --include="*.js" --include="*.json" --include="*.yaml" | grep -v "node_modules" | grep -v ".git/"; then
            echo "ERROR: Anthropic API key found"
            FOUND=1
          fi

          # Hardcoded home directories
          if grep -rn "/home/[a-z]" . --include="*.js" --include="*.json" | grep -v "node_modules" | grep -v ".git/" | grep -v "process.env.HOME"; then
            echo "ERROR: Hardcoded home directory found"
            FOUND=1
          fi

          # Windows user paths
          if grep -rn "C:\\\\Users\\\\" . --include="*.js" --include="*.json" | grep -v "node_modules" | grep -v ".git/"; then
            echo "ERROR: Windows user path found"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            exit 1
          fi

          echo "✓ No secrets found"
